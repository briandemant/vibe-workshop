line-length = 120
indent-width = 4
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    ".vscode",
    ".idea",
    "venv",
]

[format]
quote-style = "double"
indent-style= "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = false
docstring-code-line-length = "dynamic" # This only has an effect if docstring-code-format is true

